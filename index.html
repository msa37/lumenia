    <script>
      // Scroll to top on page change
      (function() {
        var oldPushState = history.pushState;
        history.pushState = function() {
          oldPushState.apply(this, arguments);
          window.scrollTo(0, 0);
          updateMobileNav();
        };
        window.addEventListener('popstate', function() {
          window.scrollTo(0, 0);
          updateMobileNav();
        });
      })();

      // Mobile nav active state
      function updateMobileNav() {
        var currentPath = window.location.pathname;
        var links = document.querySelectorAll('#lumenia-mobile-nav a');
        links.forEach(function(link) {
          var path = link.getAttribute('data-path');
          if (path === '/' ? currentPath === '/' : currentPath.startsWith(path)) {
            link.classList.add('active');
          } else {
            link.classList.remove('active');
          }
        });
      }

      // Intercept nav clicks for SPA routing
      document.querySelectorAll('#lumenia-mobile-nav a').forEach(function(link) {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          var path = link.getAttribute('href');
          history.pushState(null, '', path);
          window.dispatchEvent(new PopStateEvent('popstate'));
          updateMobileNav();
          window.scrollTo(0, 0);
        });
      });

      // Init active state
      updateMobileNav();
    </script>
